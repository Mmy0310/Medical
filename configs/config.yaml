model:
  d_model: 128
  nhead: 8
  num_encoder_layers: 4
  dim_feedforward: 256
  dropout: 0.1
  num_classes: 2
  input_dim: 64

training:
  batch_size: 32
  epochs: 50
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  seed: 42
  device: "cuda"  # "cuda" or "cpu"
  save_dir: "checkpoints"
  log_interval: 10

data:
  train_path: "data/train.csv"
  val_path: "data/val.csv"
  test_path: "data/test.csv"
  label_col: "label"
  feature_cols: null  # null means use all non-label columns
  normalize: true
